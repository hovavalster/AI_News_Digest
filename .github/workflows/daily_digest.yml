name: Daily AI News Digest

on:
  schedule:
    # Runs every 3 days at 08:00 UTC
    - cron: '0 8 */3 * *'
  workflow_dispatch:  # Enables the "Run workflow" button in the GitHub Actions UI

permissions:
  contents: write   # needed to commit seen_links.json back to the repo

jobs:
  digest:
    name: Generate and email digest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run news digest
        run: python news_digest.py
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_SENDER:        ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:      ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT:     ${{ secrets.EMAIL_RECIPIENT }}
          EMAIL_RECIPIENT_2:   ${{ secrets.EMAIL_RECIPIENT_2 }}

      - name: Commit updated seen_links.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seen_links.json
          git diff --cached --quiet || git commit -m "chore: update seen_links.json [skip ci]"
          git pull --rebase origin main
          git push
