name: Behavioral Economics Digest

on:
  schedule:
    # 09:00 UTC = 11:00 AM Israel Standard Time (UTC+2)
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  digest:
    name: Generate and email behavioral economics digest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run behavioral economics digest
        run: python becon_digest.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_SENDER:      ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:    ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT:   ${{ secrets.EMAIL_RECIPIENT }}

      - name: Commit updated becon_seen_links.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/becon_seen_links.json
          git diff --cached --quiet || git commit -m "chore: update becon_seen_links.json [skip ci]"
          git push
